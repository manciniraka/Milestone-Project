<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    
<!-- Navigation Bar -->
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-black fw-bold" href="index.html">TripinVille</a>
            <div>
                <a class="nav-link d-inline text-black" href="article.html">Articles</a>
                <a class="nav-link d-inline text-black" href="#">Merchandise</a>
                <a class="nav-link d-inline text-black" href="faq.html">FAQ</a>
                <a class="nav-link d-inline text-black" href="login.html">Login</a>
            </div>
        </div>
    </nav>
</header>

<div class="contact-section d-flex justify-content-center align-items-center">
    <div class="overlay p-4 p-md-5">
        <h2 class="text-center mb-4 text-black">Contact Us</h2>

        <form class="contact-form">
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <input type="text" class="form-control" placeholder="Name" required>
                </div>
                <div class="col-md-6">
                    <input type="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="number" class="form-control" placeholder="Phone Number" required>
                </div>
                <div class="mb-3">
                    <textarea class="form-control" rows="4" placeholder="Comment" required></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-custom px-4">Send</button>
        </form>
    </div>
</div>
    
<footer class="footer fixed-bottom">
    <div class="container d-block text-center text-white">
        <p>© 2026 TripinVille</p>
        <a class="text-white" href="#">Contact Us</a>
    </div>
</footer>

</body>
</html>
